# Regenerates the Playwright visual baselines on Linux and pushes the
# updated PNGs back to the triggering branch. Runs only when an admin
# clicks "Run workflow" in the GitHub UI (`workflow_dispatch`) — never
# on push or PR.
#
# Why this exists: visual baselines are platform-dependent (font
# rendering differs between macOS and Linux). The dev box is macOS, so
# locally-generated `--update-snapshots` produces `*-chromium-darwin.png`,
# but CI runs on Linux and wants `*-chromium-linux.png`. Without Linux
# baselines the `e2e` job is permanently red.
#
# Flow:
#   1. Admin opens the Actions tab, picks this workflow, clicks
#      "Run workflow", and selects the branch that needs Linux
#      baselines (typically a PR branch or `main`).
#   2. The job checks out that branch, runs Playwright with
#      `--update-snapshots`, and commits any new/changed
#      `*-chromium-linux.png` files back to the same branch.
#   3. The next CI run on that branch then has Linux baselines to
#      compare against, and the visual job goes green.
#
# Safety: the commit is gated on `git diff --quiet` so an empty
# regeneration produces no commit. The push uses the default
# GITHUB_TOKEN with the workflow-scoped `contents: write` permission;
# no PAT involved.

name: Regenerate visual snapshots (Linux)

on:
  workflow_dispatch:
    inputs:
      spec:
        description: "Playwright spec to regenerate (default: e2e/visual.spec.ts)"
        required: false
        default: "e2e/visual.spec.ts"

permissions:
  contents: write

jobs:
  regenerate:
    name: Update Linux baselines
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          # Need write access to push the regenerated PNGs back to the
          # branch the workflow was dispatched from.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Regenerate snapshots
        run: npx playwright test "${{ github.event.inputs.spec }}" --update-snapshots

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Commit and push baselines
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage every snapshot that lives next to the spec. We don't
          # restrict to `*-chromium-linux.png` because Playwright may
          # also create per-test directories; whatever changed inside
          # the snapshot folder is what we want to commit.
          git add e2e/*.spec.ts-snapshots/

          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "ci(visual): regenerate Linux baselines

          Auto-generated by .github/workflows/regenerate-visual-snapshots.yml.
          Triggered by ${{ github.actor }} on ${{ github.ref_name }}."
          git push origin HEAD:${{ github.ref_name }}
