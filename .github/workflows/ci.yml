name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-run from the Actions UI. Useful when an external
  # condition changed (e.g. snapshots regenerated by
  # `regenerate-visual-snapshots.yml`, which pushes via GITHUB_TOKEN
  # and therefore does not retrigger workflows on its own).
  workflow_dispatch: {}

# Cancel previous runs of the same branch on a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Coverage summary in job log
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (k) => \`\${k}: \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total})\`;
              console.log('| Metric | Value |');
              console.log('|---|---|');
              for (const k of ['statements','branches','functions','lines']) {
                console.log(\`| \${k} | \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total}) |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://taote-pocus.example.com

      - name: Bundle size budget
        run: npm run size:check

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Aggregate gate. Branch protection rules can require this single
  # `verify` check instead of having to keep the required-checks list
  # in sync with every job rename. `verify` succeeds only when every
  # required upstream job succeeded.
  verify:
    name: Verify (PR gate)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: always()
    steps:
      - name: All required jobs succeeded
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "Required jobs did not all succeed:"
            echo "  quality: ${{ needs.quality.result }}"
            echo "  e2e:     ${{ needs.e2e.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."

  # Lighthouse runs only on pushes to main (after a PR merges) so PR
  # turnaround stays fast. The thresholds in `.lighthouserc.json` are
  # enforced; the run fails if the build regresses on perf or a11y.
  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          # Public storage upload — temporary, anonymous report URLs in
          # the action log. Swap for a Lighthouse Server token when
          # the team wants persistent history.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
