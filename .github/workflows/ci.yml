name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-run from the Actions UI. Useful when an external
  # condition changed (e.g. snapshots regenerated by
  # `regenerate-visual-snapshots.yml`, which pushes via GITHUB_TOKEN
  # and therefore does not retrigger workflows on its own).
  workflow_dispatch: {}

# Cancel previous runs of the same branch on a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Default permissions are `contents: read` only. The coverage-report
    # step (below) needs `pull-requests: write` to upsert a sticky
    # comment via the github-script API. `issues: write` is the right
    # grant here because the GitHub API treats PRs as a subclass of
    # Issues for the comments endpoint.
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Supply-chain check: fails the build only on `high` or
      # `critical` advisories. `moderate` and `low` are surfaced as
      # output (visible in the job log + Dependabot inbox) but don't
      # block — they're acceptable while a fix lands. Tighten to
      # `--audit-level=moderate` once the dev-only `@lhci/cli` chain
      # ships a non-breaking patch (currently locked at 4 low vulns
      # that require a `--force` major bump).
      - name: Security audit
        run: npm audit --audit-level=high

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Coverage summary in job log
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (k) => \`\${k}: \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total})\`;
              console.log('| Metric | Value |');
              console.log('|---|---|');
              for (const k of ['statements','branches','functions','lines']) {
                console.log(\`| \${k} | \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total}) |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      # Sticky PR comment with the coverage breakdown. Useful because:
      #   1. Reviewers see the % without opening the build log.
      #   2. The per-glob block makes it obvious when an edit lands
      #      in `lib/**` (where the threshold is high) vs `hooks/**`
      #      (where the bar is intentionally lower — most surface
      #      is exercised through e2e).
      #
      # The step is gated on `pull_request` events so the workflow
      # doesn't try to comment on push-to-main runs (no PR to attach
      # to → API 404). `always()` keeps the comment posted even when
      # an upstream step failed (e.g., the build) so a contributor
      # can still see what their unit tests covered.
      - name: Coverage report on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const summaryPath = "coverage/coverage-summary.json";
            if (!fs.existsSync(summaryPath)) {
              core.info("No coverage-summary.json — skipping PR comment.");
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));

            // Aggregate per-glob (lib/** vs hooks/**) by re-walking the
            // file entries. This mirrors the per-glob threshold in
            // `vitest.config.ts` so the comment shows the same blocks
            // a regression would fail on.
            function aggregate(predicate) {
              const totals = {
                statements: { total: 0, covered: 0 },
                branches: { total: 0, covered: 0 },
                functions: { total: 0, covered: 0 },
                lines: { total: 0, covered: 0 },
              };
              for (const [file, entry] of Object.entries(summary)) {
                if (file === "total") continue;
                if (!predicate(file)) continue;
                for (const k of Object.keys(totals)) {
                  totals[k].total += entry[k].total;
                  totals[k].covered += entry[k].covered;
                }
              }
              const out = {};
              for (const [k, v] of Object.entries(totals)) {
                out[k] = {
                  ...v,
                  pct: v.total === 0 ? 100 : (v.covered / v.total) * 100,
                };
              }
              return out;
            }

            // File paths in the summary are absolute (workspace-rooted).
            // Match by the `/lib/` and `/hooks/` segment to avoid
            // collisions with the workspace name.
            const libCov = aggregate((f) => f.includes("/lib/"));
            const hooksCov = aggregate((f) => f.includes("/hooks/"));
            const total = summary.total;

            // Per-glob thresholds, kept in sync with `vitest.config.ts`.
            // If a future PR loosens or tightens them, update both
            // places — there's no programmatic source of truth for the
            // numbers (the vitest config is TypeScript so we'd have to
            // parse / import it from the workflow, which adds churn).
            const THRESHOLDS = {
              "lib/**":   { statements: 92, branches: 84, functions: 95, lines: 95 },
              "hooks/**": { statements: 55, branches: 45, functions: 55, lines: 60 },
            };

            const fmt = (m) => `${m.pct.toFixed(2)}% (${m.covered}/${m.total})`;
            const mark = (pct, threshold) =>
              pct >= threshold ? "✅" : pct >= threshold - 2 ? "⚠️" : "❌";

            function block(name, cov, thresholds) {
              const rows = ["statements", "branches", "functions", "lines"]
                .map((k) => {
                  const t = thresholds[k];
                  return `| ${k} | ${fmt(cov[k])} | ${t}% | ${mark(cov[k].pct, t)} |`;
                })
                .join("\n");
              return [
                `### \`${name}\``,
                "",
                "| Metric | Coverage | Threshold | Status |",
                "|---|---|---|---|",
                rows,
                "",
              ].join("\n");
            }

            // Overall block — no threshold gate, just visibility. The
            // gating happens on the per-glob blocks above (these are
            // what vitest fails on).
            const overall = [
              "### Overall (all included files)",
              "",
              "| Metric | Coverage |",
              "|---|---|",
              ...["statements", "branches", "functions", "lines"].map(
                (k) => `| ${k} | ${fmt(total[k])} |`,
              ),
              "",
            ].join("\n");

            const body = [
              "## ☂️ Coverage report",
              "",
              "Per-glob breakdown matches the thresholds enforced by Vitest in `vitest.config.ts`.",
              "✅ above threshold · ⚠️ within 2pp · ❌ below.",
              "",
              block("lib/**", libCov, THRESHOLDS["lib/**"]),
              block("hooks/**", hooksCov, THRESHOLDS["hooks/**"]),
              overall,
              "<sub>Posted by CI · re-runs replace this comment.</sub>",
            ].join("\n");

            // Sticky-comment upsert: find a previous comment by this
            // bot that starts with our marker heading and update it in
            // place. Avoids the long history of stale coverage comments
            // a naked `createComment` would produce on every push.
            const STICKY_MARKER = "## ☂️ Coverage report";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) =>
                c.user &&
                c.user.type === "Bot" &&
                typeof c.body === "string" &&
                c.body.startsWith(STICKY_MARKER),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing coverage comment #${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new coverage comment.");
            }

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://taote-pocus.example.com

      - name: Bundle size budget
        run: npm run size:check

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Aggregate gate. Branch protection rules can require this single
  # `verify` check instead of having to keep the required-checks list
  # in sync with every job rename. `verify` succeeds only when every
  # required upstream job succeeded.
  verify:
    name: Verify (PR gate)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: always()
    steps:
      - name: All required jobs succeeded
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "Required jobs did not all succeed:"
            echo "  quality: ${{ needs.quality.result }}"
            echo "  e2e:     ${{ needs.e2e.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."

  # Lighthouse now runs on every PR too (was push-to-main only), with
  # `continue-on-error: true` on the run step so a flaky perf swing
  # doesn't red-flag an unrelated change. The thresholds in
  # `.lighthouserc.json` still gate post-merge — what's new is that
  # contributors get score visibility BEFORE merge via the sticky PR
  # comment posted from the parsed manifest.
  #
  # Perf scores have ~5pp run-to-run variance even with `numberOfRuns=3`
  # in the LHCI config; the comment shows the median so a single
  # outlier doesn't dominate the signal.
  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        id: lhci
        # Don't fail the entire PR if a single run blips under threshold —
        # the post-merge gate (push to main) still enforces the floor.
        # The PR comment step below reads the manifest regardless of
        # this step's exit code, so contributors always see the scores.
        continue-on-error: true
        run: npm run lighthouse
        env:
          # Public storage upload — temporary, anonymous report URLs in
          # the action log. Swap for a Lighthouse Server token when
          # the team wants persistent history.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # Sticky PR comment with median per-URL scores. Same upsert
      # pattern as the coverage comment (Phase A): find an existing
      # bot comment with our marker heading and replace it, otherwise
      # create a new one. The marker is unique to this report so it
      # doesn't collide with coverage / a11y comments.
      #
      # We parse `.lighthouseci/lhr-*.json` directly (the per-run
      # Lighthouse Result files) instead of `manifest.json`. Why:
      # `manifest.json` is ONLY written by LHCI's `filesystem` upload
      # target (see `node_modules/@lhci/cli/src/upload/upload.js >
      # runFilesystemTarget`). Our config uses
      # `upload.target: "temporary-public-storage"`, which uploads
      # reports to anonymous URLs but DOES NOT write manifest.json
      # locally. The per-URL `lhr-<timestamp>.json` files are always
      # written during `collect`, regardless of upload target — so
      # they're a stable source of truth.
      - name: Lighthouse report on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const LHCI_DIR = ".lighthouseci";
            if (!fs.existsSync(LHCI_DIR)) {
              core.info("No .lighthouseci/ directory — skipping PR comment (LHCI step did not run).");
              return;
            }

            // Collect every per-run LHR. File pattern is
            // `lhr-<timestamp>.json` (per `node_modules/@lhci/utils/
            // src/saved-reports.js > LHR_REGEX`). For `numberOfRuns: 3`
            // × 4 URLs we expect 12 files.
            const LHR_REGEX = /^lhr-\d+\.json$/;
            const lhrFiles = fs.readdirSync(LHCI_DIR).filter((f) => LHR_REGEX.test(f));
            if (lhrFiles.length === 0) {
              core.warning("No lhr-*.json files in .lighthouseci/ — LHCI may have failed before producing reports.");
              return;
            }

            // Group runs by URL. Compute per-category MEDIAN across
            // the 3 runs per URL. Simpler than LHCI's representative-
            // run algorithm (which sorts by FCP + TTI proximity) and
            // gives equivalent signal at our 3-runs scale.
            const runsByUrl = new Map();
            for (const file of lhrFiles) {
              const lhr = JSON.parse(fs.readFileSync(path.join(LHCI_DIR, file), "utf8"));
              if (!runsByUrl.has(lhr.requestedUrl)) runsByUrl.set(lhr.requestedUrl, []);
              runsByUrl.get(lhr.requestedUrl).push(lhr);
            }

            function medianScore(runs, category) {
              const scores = runs
                .map((r) => r.categories?.[category]?.score)
                .filter((s) => typeof s === "number")
                .sort((a, b) => a - b);
              if (scores.length === 0) return null;
              return scores[Math.floor(scores.length / 2)];
            }

            // Shape per URL to mirror the original `manifest`-style
            // entry the comment rendering expects: { url, summary: {
            // performance, accessibility, "best-practices", seo } }.
            const reps = Array.from(runsByUrl.entries()).map(([url, runs]) => ({
              url,
              summary: {
                performance: medianScore(runs, "performance"),
                accessibility: medianScore(runs, "accessibility"),
                "best-practices": medianScore(runs, "best-practices"),
                seo: medianScore(runs, "seo"),
              },
            }));

            // Thresholds in `.lighthouserc.json`. Kept in sync here so
            // the comment's ✅/⚠️/❌ markers match what the CI gate
            // would enforce post-merge. If the thresholds change,
            // update both places.
            const THRESHOLDS = {
              performance: 0.85,
              accessibility: 0.95,
              "best-practices": 0.9,
              seo: 0.95,
            };
            const mark = (score, threshold) => {
              if (score >= threshold) return "✅";
              if (score >= threshold - 0.05) return "⚠️";
              return "❌";
            };
            const pct = (s) => `${Math.round(s * 100)}`;
            const labelOf = (u) => {
              try {
                return new URL(u).pathname || "/";
              } catch {
                return u;
              }
            };

            const header =
              "| URL | Performance | Accessibility | Best practices | SEO |\n" +
              "|---|---|---|---|---|";
            const rows = reps
              .map((r) => {
                const s = r.summary;
                const cell = (key) =>
                  s[key] == null ? "—" : `${pct(s[key])} ${mark(s[key], THRESHOLDS[key])}`;
                return `| \`${labelOf(r.url)}\` | ${cell("performance")} | ${cell("accessibility")} | ${cell("best-practices")} | ${cell("seo")} |`;
              })
              .join("\n");

            const thresholdsList = Object.entries(THRESHOLDS)
              .map(([k, v]) => `\`${k}\` ≥ ${Math.round(v * 100)}`)
              .join(" · ");

            const body = [
              "## 💡 Lighthouse report",
              "",
              `Median per category across ${lhrFiles.length} runs over ${reps.length} URL(s) — parsed from \`.lighthouseci/lhr-*.json\`.`,
              `Thresholds: ${thresholdsList}. ✅ pass · ⚠️ within 5pp · ❌ below · — no data.`,
              "",
              header,
              rows,
              "",
              "<sub>Perf scores have ~5pp run-to-run variance even at `numberOfRuns: 3`. The post-merge run on `main` is what gates the deployment.</sub>",
            ].join("\n");

            // Sticky upsert (same pattern as the coverage comment).
            const STICKY_MARKER = "## 💡 Lighthouse report";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) =>
                c.user &&
                c.user.type === "Bot" &&
                typeof c.body === "string" &&
                c.body.startsWith(STICKY_MARKER),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing Lighthouse comment #${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new Lighthouse comment.");
            }

            // Surface a job-summary entry too — useful when the comment
            // step itself fails (e.g., permissions) so the data isn't lost.
            await core.summary
              .addHeading("Lighthouse", 2)
              .addRaw(body.replace(STICKY_MARKER, "").trim())
              .write();
