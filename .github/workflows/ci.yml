name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-run from the Actions UI. Useful when an external
  # condition changed (e.g. snapshots regenerated by
  # `regenerate-visual-snapshots.yml`, which pushes via GITHUB_TOKEN
  # and therefore does not retrigger workflows on its own).
  workflow_dispatch: {}

# Cancel previous runs of the same branch on a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Default permissions are `contents: read` only. The coverage-report
    # step (below) needs `pull-requests: write` to upsert a sticky
    # comment via the github-script API. `issues: write` is the right
    # grant here because the GitHub API treats PRs as a subclass of
    # Issues for the comments endpoint.
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Supply-chain check on PRODUCTION dependencies only.
      #
      # `--omit=dev` skips devDependencies entirely. Rationale:
      # devDeps run on a developer's laptop or a CI runner, never
      # in production. Vulnerabilities there are real but a
      # different threat model (your build host getting popped, not
      # an end user). The runtime-served bundle is what users are
      # exposed to — that's what this gate enforces.
      #
      # History: this used to be a plain `npm audit --audit-level=
      # high`, which kept tripping on advisories in the `@lhci/cli`
      # transitive chain (`tmp`, `inquirer`, `external-editor`).
      # LHCI is a CI-only tool — its vulns can't reach a visitor.
      # The `--audit-level=high` threshold stays so a real prod-
      # dep advisory (e.g., a Next.js or Clerk vuln) STILL fails
      # the build.
      - name: Security audit (prod deps only)
        run: npm audit --audit-level=high --omit=dev

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      # ─── Coverage delta gate (PR-only) ───
      # The absolute thresholds in vitest.config catch CATASTROPHIC
      # regressions but tolerate the slow grind. Between April and
      # May-2026 lib/** drifted 7pp downward across ~20 PRs that each
      # individually passed the absolute floor. This step flips the
      # contract: every PR has to NOT drop main's coverage by more
      # than 0.5pp on any metric. The absolute thresholds stay as
      # the floor; this step prevents quiet sliding toward it.
      #
      # On a `push` to main: only the coverage artifact gets uploaded
      # (above). No delta check because there's no PR baseline.
      #
      # On a `pull_request`: download the latest successful main
      # coverage artifact, place it at `.coverage-baseline/`, and
      # run `scripts/coverage-delta.mjs`. If the artifact is missing
      # (first run after a retention expiry, or main itself failed
      # CI), the script exits 0 with a one-line note — the absolute
      # thresholds still apply, so a missing baseline isn't a
      # blocker.
      - name: Download main coverage baseline (PR-only)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: ci.yml
          name: coverage
          branch: main
          event: push
          workflow_conclusion: success
          path: .coverage-baseline
          # Don't fail the step if no artifact is found — the script
          # tolerates a missing baseline.
          if_no_artifact_found: warn

      - name: Coverage delta vs main (PR-only)
        if: github.event_name == 'pull_request'
        run: node scripts/coverage-delta.mjs

      - name: Coverage summary in job log
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (k) => \`\${k}: \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total})\`;
              console.log('| Metric | Value |');
              console.log('|---|---|');
              for (const k of ['statements','branches','functions','lines']) {
                console.log(\`| \${k} | \${s[k].pct.toFixed(2)}% (\${s[k].covered}/\${s[k].total}) |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      # Sticky PR comment with the coverage breakdown. Useful because:
      #   1. Reviewers see the % without opening the build log.
      #   2. The per-glob block makes it obvious when an edit lands
      #      in `lib/**` (where the threshold is high) vs `hooks/**`
      #      (where the bar is intentionally lower — most surface
      #      is exercised through e2e).
      #
      # The step is gated on `pull_request` events so the workflow
      # doesn't try to comment on push-to-main runs (no PR to attach
      # to → API 404). `always()` keeps the comment posted even when
      # an upstream step failed (e.g., the build) so a contributor
      # can still see what their unit tests covered.
      - name: Coverage report on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const summaryPath = "coverage/coverage-summary.json";
            if (!fs.existsSync(summaryPath)) {
              core.info("No coverage-summary.json — skipping PR comment.");
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));

            // Aggregate per-glob (lib/** vs hooks/**) by re-walking the
            // file entries. This mirrors the per-glob threshold in
            // `vitest.config.ts` so the comment shows the same blocks
            // a regression would fail on.
            function aggregate(predicate) {
              const totals = {
                statements: { total: 0, covered: 0 },
                branches: { total: 0, covered: 0 },
                functions: { total: 0, covered: 0 },
                lines: { total: 0, covered: 0 },
              };
              for (const [file, entry] of Object.entries(summary)) {
                if (file === "total") continue;
                if (!predicate(file)) continue;
                for (const k of Object.keys(totals)) {
                  totals[k].total += entry[k].total;
                  totals[k].covered += entry[k].covered;
                }
              }
              const out = {};
              for (const [k, v] of Object.entries(totals)) {
                out[k] = {
                  ...v,
                  pct: v.total === 0 ? 100 : (v.covered / v.total) * 100,
                };
              }
              return out;
            }

            // File paths in the summary are absolute (workspace-rooted).
            // Match by the `/lib/` and `/hooks/` segment to avoid
            // collisions with the workspace name.
            const libCov = aggregate((f) => f.includes("/lib/"));
            const hooksCov = aggregate((f) => f.includes("/hooks/"));
            const total = summary.total;

            // Per-glob thresholds, kept in sync with `vitest.config.ts`.
            // If a future PR loosens or tightens them, update both
            // places — there's no programmatic source of truth for the
            // numbers (the vitest config is TypeScript so we'd have to
            // parse / import it from the workflow, which adds churn).
            const THRESHOLDS = {
              "lib/**":   { statements: 92, branches: 84, functions: 95, lines: 95 },
              "hooks/**": { statements: 55, branches: 45, functions: 55, lines: 60 },
            };

            const fmt = (m) => `${m.pct.toFixed(2)}% (${m.covered}/${m.total})`;
            const mark = (pct, threshold) =>
              pct >= threshold ? "✅" : pct >= threshold - 2 ? "⚠️" : "❌";

            function block(name, cov, thresholds) {
              const rows = ["statements", "branches", "functions", "lines"]
                .map((k) => {
                  const t = thresholds[k];
                  return `| ${k} | ${fmt(cov[k])} | ${t}% | ${mark(cov[k].pct, t)} |`;
                })
                .join("\n");
              return [
                `### \`${name}\``,
                "",
                "| Metric | Coverage | Threshold | Status |",
                "|---|---|---|---|",
                rows,
                "",
              ].join("\n");
            }

            // Overall block — no threshold gate, just visibility. The
            // gating happens on the per-glob blocks above (these are
            // what vitest fails on).
            const overall = [
              "### Overall (all included files)",
              "",
              "| Metric | Coverage |",
              "|---|---|",
              ...["statements", "branches", "functions", "lines"].map(
                (k) => `| ${k} | ${fmt(total[k])} |`,
              ),
              "",
            ].join("\n");

            const body = [
              "## ☂️ Coverage report",
              "",
              "Per-glob breakdown matches the thresholds enforced by Vitest in `vitest.config.ts`.",
              "✅ above threshold · ⚠️ within 2pp · ❌ below.",
              "",
              block("lib/**", libCov, THRESHOLDS["lib/**"]),
              block("hooks/**", hooksCov, THRESHOLDS["hooks/**"]),
              overall,
              "<sub>Posted by CI · re-runs replace this comment.</sub>",
            ].join("\n");

            // Sticky-comment upsert: find a previous comment by this
            // bot that starts with our marker heading and update it in
            // place. Avoids the long history of stale coverage comments
            // a naked `createComment` would produce on every push.
            const STICKY_MARKER = "## ☂️ Coverage report";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) =>
                c.user &&
                c.user.type === "Bot" &&
                typeof c.body === "string" &&
                c.body.startsWith(STICKY_MARKER),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing coverage comment #${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new coverage comment.");
            }

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://taote-pocus.example.com

      - name: Bundle size budget
        run: npm run size:check

      # Sentry observability guard. Production CI builds MUST have
      # NEXT_PUBLIC_SENTRY_DSN set; otherwise the SDK is a no-op and
      # errors never reach Sentry. The script skips on local
      # non-production runs. To intentionally bypass (rotating keys),
      # set `ALLOW_MISSING_SENTRY_DSN=1` in the run env — the
      # build logs a loud warning but proceeds.
      - name: Sentry production guard
        run: npm run sentry:guard
        env:
          # CI runs always set NODE_ENV=test for vitest; the build
          # step above runs `next build` which sets it to production
          # internally. Pass CI=true so the guard recognizes this is
          # a production-targeted run regardless of when in the job
          # it executes.
          CI: "true"
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Aggregate gate. Branch protection rules can require this single
  # `verify` check instead of having to keep the required-checks list
  # in sync with every job rename. `verify` succeeds only when every
  # required upstream job succeeded.
  #
  # Note on lighthouse: included here so a failed LHCI run on main
  # (where the step is hard-gated, see lighthouse job comments)
  # propagates to `verify`. On PR the lighthouse step uses
  # `continue-on-error` so the JOB is always "success" — the verify
  # check passes regardless of what the assertions said. The
  # asymmetry is intentional: contributors see Lighthouse scores in
  # the sticky comment without being blocked by perf-test variance,
  # while post-merge regressions still light up red.
  verify:
    name: Verify (PR gate)
    runs-on: ubuntu-latest
    needs: [quality, e2e, lighthouse]
    if: always()
    steps:
      - name: All required jobs succeeded
        # `success` = ran and passed.
        # `skipped` = the job's `if:` excluded this event (e.g.,
        # lighthouse skips on `workflow_dispatch`); treated as benign
        # because the gate didn't apply for this trigger.
        # `failure` / `cancelled` = something we care about broke.
        run: |
          quality_result="${{ needs.quality.result }}"
          e2e_result="${{ needs.e2e.result }}"
          lighthouse_result="${{ needs.lighthouse.result }}"
          fail=0
          case "$quality_result" in success) ;; *) fail=1 ;; esac
          case "$e2e_result" in success) ;; *) fail=1 ;; esac
          case "$lighthouse_result" in success|skipped) ;; *) fail=1 ;; esac
          if [ "$fail" -ne 0 ]; then
            echo "Required jobs did not all succeed:"
            echo "  quality:    $quality_result"
            echo "  e2e:        $e2e_result"
            echo "  lighthouse: $lighthouse_result"
            exit 1
          fi
          echo "All required jobs succeeded."

  # Lighthouse runs on every PR (informational, soft) and on push to
  # main (hard gate). The split is implemented via a conditional
  # `continue-on-error` on the run step:
  #
  #   - PR runs: `continue-on-error: true`. Perf scores have ~5pp
  #     run-to-run variance even with `numberOfRuns=3` and one bad
  #     LHCI blip shouldn't red-flag an unrelated change. The sticky
  #     PR comment still surfaces the median scores so reviewers see
  #     the regression candidates BEFORE merge.
  #   - main runs: `continue-on-error: false`. The thresholds in
  #     `.lighthouserc.json` (perf ≥ 0.85, a11y ≥ 0.95, best-practices
  #     ≥ 0.9, SEO ≥ 0.95) are the contract; if a merge regresses
  #     past them, the workflow goes red and the `verify` aggregate
  #     gate fails. Deployment to Netlify happens via a separate
  #     pipeline (not blocked by this) — the red `verify` is the
  #     alert signal so the next PR can revert / refactor.
  #
  # Earlier history: an unconditional `continue-on-error: true` left
  # the gate decorative — the assertions ran but never blocked. The
  # YAML's old "post-merge gate enforces the floor" claim was
  # aspirational, not implemented. PR fixing this (May-2026) made
  # the implementation match the documented intent.
  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        id: lhci
        # Conditional gate (see job-level comment above):
        #   - pull_request → soft (don't block, ~5pp variance noise)
        #   - push to main → hard (assertions in .lighthouserc.json
        #     become real). The PR comment step below reads the
        #     manifest regardless of this step's exit code, so
        #     contributors always see the scores either way.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: npm run lighthouse
        env:
          # Public storage upload — temporary, anonymous report URLs in
          # the action log. Swap for a Lighthouse Server token when
          # the team wants persistent history.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # Sticky PR comment with median per-URL scores. Same upsert
      # pattern as the coverage comment (Phase A): find an existing
      # bot comment with our marker heading and replace it, otherwise
      # create a new one. The marker is unique to this report so it
      # doesn't collide with coverage / a11y comments.
      #
      # We parse `.lighthouseci/lhr-*.json` directly (the per-run
      # Lighthouse Result files) instead of `manifest.json`. Why:
      # `manifest.json` is ONLY written by LHCI's `filesystem` upload
      # target (see `node_modules/@lhci/cli/src/upload/upload.js >
      # runFilesystemTarget`). Our config uses
      # `upload.target: "temporary-public-storage"`, which uploads
      # reports to anonymous URLs but DOES NOT write manifest.json
      # locally. The per-URL `lhr-<timestamp>.json` files are always
      # written during `collect`, regardless of upload target — so
      # they're a stable source of truth.
      - name: Lighthouse report on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const LHCI_DIR = ".lighthouseci";
            if (!fs.existsSync(LHCI_DIR)) {
              core.info("No .lighthouseci/ directory — skipping PR comment (LHCI step did not run).");
              return;
            }

            // Collect every per-run LHR. File pattern is
            // `lhr-<timestamp>.json` (per `node_modules/@lhci/utils/
            // src/saved-reports.js > LHR_REGEX`). For `numberOfRuns: 3`
            // × 4 URLs we expect 12 files.
            const LHR_REGEX = /^lhr-\d+\.json$/;
            const lhrFiles = fs.readdirSync(LHCI_DIR).filter((f) => LHR_REGEX.test(f));
            if (lhrFiles.length === 0) {
              core.warning("No lhr-*.json files in .lighthouseci/ — LHCI may have failed before producing reports.");
              return;
            }

            // Group runs by URL.
            const runsByUrl = new Map();
            for (const file of lhrFiles) {
              const lhr = JSON.parse(fs.readFileSync(path.join(LHCI_DIR, file), "utf8"));
              if (!runsByUrl.has(lhr.requestedUrl)) runsByUrl.set(lhr.requestedUrl, []);
              runsByUrl.get(lhr.requestedUrl).push(lhr);
            }

            // Per-category aggregation. Matches LHCI's assertion
            // defaults (see node_modules/@lhci/utils/src/audit-diff-
            // finder.js > getAssertionResults and the docs at
            // github.com/GoogleChrome/lighthouse-ci/blob/main/docs/
            // configuration.md#assert):
            //
            //   - performance     → "optimistic" (max across runs).
            //     The metric varies ~5-10pp run-to-run; LHCI's gate
            //     reasoning is that a single fast run proves the
            //     site CAN hit the bar, and slow runs are runner
            //     noise rather than the user experience.
            //   - accessibility / best-practices / seo → "median".
            //     These don't have run-to-run variance — same
            //     score every run unless the build changed.
            //
            // Matching here means the comment's ✅/❌ markers track
            // the CI gate exactly: if a reviewer sees ❌ in the
            // comment, the post-merge run on `main` will fail too.
            function aggregateScore(runs, category) {
              const scores = runs
                .map((r) => r.categories?.[category]?.score)
                .filter((s) => typeof s === "number");
              if (scores.length === 0) return null;
              if (category === "performance") {
                return Math.max(...scores);
              }
              const sorted = scores.slice().sort((a, b) => a - b);
              return sorted[Math.floor(sorted.length / 2)];
            }

            // Shape per URL: { url, summary: { performance,
            // accessibility, "best-practices", seo } }.
            const reps = Array.from(runsByUrl.entries()).map(([url, runs]) => ({
              url,
              summary: {
                performance: aggregateScore(runs, "performance"),
                accessibility: aggregateScore(runs, "accessibility"),
                "best-practices": aggregateScore(runs, "best-practices"),
                seo: aggregateScore(runs, "seo"),
              },
            }));

            // Thresholds in `.lighthouserc.json`. Kept in sync here so
            // the comment's ✅/⚠️/❌ markers match what the CI gate
            // would enforce post-merge. If the thresholds change,
            // update both places.
            const THRESHOLDS = {
              performance: 0.85,
              accessibility: 0.95,
              "best-practices": 0.9,
              seo: 0.95,
            };
            const mark = (score, threshold) => {
              if (score >= threshold) return "✅";
              if (score >= threshold - 0.05) return "⚠️";
              return "❌";
            };
            const pct = (s) => `${Math.round(s * 100)}`;
            const labelOf = (u) => {
              try {
                return new URL(u).pathname || "/";
              } catch {
                return u;
              }
            };

            const header =
              "| URL | Performance | Accessibility | Best practices | SEO |\n" +
              "|---|---|---|---|---|";
            const rows = reps
              .map((r) => {
                const s = r.summary;
                const cell = (key) =>
                  s[key] == null ? "—" : `${pct(s[key])} ${mark(s[key], THRESHOLDS[key])}`;
                return `| \`${labelOf(r.url)}\` | ${cell("performance")} | ${cell("accessibility")} | ${cell("best-practices")} | ${cell("seo")} |`;
              })
              .join("\n");

            const thresholdsList = Object.entries(THRESHOLDS)
              .map(([k, v]) => `\`${k}\` ≥ ${Math.round(v * 100)}`)
              .join(" · ");

            const body = [
              "## 💡 Lighthouse report",
              "",
              `Across ${lhrFiles.length} runs over ${reps.length} URL(s). Performance reported as best-of-3 (matches LHCI's optimistic aggregation for perf, which absorbs runner-noise variance); accessibility / best-practices / SEO reported as median (those don't vary run-to-run).`,
              `Thresholds: ${thresholdsList}. ✅ pass · ⚠️ within 5pp · ❌ below · — no data.`,
              "",
              header,
              rows,
              "",
              "<sub>The post-merge run on `main` is what gates the deployment — same numbers, same thresholds, same aggregation.</sub>",
            ].join("\n");

            // Sticky upsert (same pattern as the coverage comment).
            const STICKY_MARKER = "## 💡 Lighthouse report";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) =>
                c.user &&
                c.user.type === "Bot" &&
                typeof c.body === "string" &&
                c.body.startsWith(STICKY_MARKER),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing Lighthouse comment #${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new Lighthouse comment.");
            }

            // Surface a job-summary entry too — useful when the comment
            // step itself fails (e.g., permissions) so the data isn't lost.
            await core.summary
              .addHeading("Lighthouse", 2)
              .addRaw(body.replace(STICKY_MARKER, "").trim())
              .write();
