# Dependabot — supply-chain monitoring for the repo.
#
# Config rationale:
#
#   - npm: weekly cadence. Daily would create PR noise; monthly misses
#     security updates by too long. Weekly is the standard sweet spot
#     for most projects.
#   - GitHub Actions: same cadence. Action versions don't change often
#     but pinning matters for CI integrity.
#   - Grouping: patch and minor updates ship as SEPARATE grouped PRs
#     per week. The split matters because patches are AUTO-MERGED by
#     `.github/workflows/dependabot-auto-merge.yml` when CI is green —
#     mixing them with minors would either block patch auto-merge
#     (waiting for human review of the minors) or auto-merge minors by
#     accident (risking the kind of unexpected breakage that "1.4 →
#     1.5" sometimes carries). Major version bumps still arrive as
#     individual PRs because they often need manual intervention.
#   - `assignees` / `reviewers` left empty intentionally — the repo
#     has one maintainer; Dependabot's default behaviour (no assignee)
#     keeps the PR notifications visible without flooding inboxes.
#   - `open-pull-requests-limit: 5`: prevents Dependabot from opening
#     50 PRs after a long gap. Five is enough for the maintainer to
#     triage in one sitting; lingering security ones get bumped first.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    groups:
      # Patches batched into one PR — auto-merged when CI is green
      # (see `.github/workflows/dependabot-auto-merge.yml`).
      npm-patch:
        update-types:
          - "patch"
      # Minors batched into a separate PR — requires manual review
      # because minor bumps sometimes introduce subtle behavior
      # changes even when SemVer-compliant.
      npm-minor:
        update-types:
          - "minor"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
